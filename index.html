<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Родовое древо</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header"><h1><span class="logo">🌳</span> Родовое древо</h1><div class="stats">👥 <span id="persons-count">0</span></div></div>
<div class="toolbar">
<button class="btn btn-primary" id="add-person-btn">➕ Добавить</button>
<button class="btn btn-outline" id="zoom-in">🔍 +</button>
<button class="btn btn-outline" id="zoom-out">🔍 -</button>
<button class="btn btn-outline" id="fit-view">🎯</button>
<button class="btn btn-secondary" id="export-json">💾 Экспорт</button>
<button class="btn btn-secondary" id="import-btn">📂 Импорт</button>
<input type="file" id="file-input" accept=".json" style="display:none">
<button class="btn btn-outline" id="clear-data">🗑️</button>
<button class="btn btn-outline" id="load-example">📋</button>
</div>
<div class="main-container">
<div class="canvas-container"><canvas id="tree-canvas"></canvas><div class="info-panel">💡 Кликните на персону</div><div class="zoom-indicator">🔍 <span id="zoom-percent">100</span>%</div></div>
<div class="sidebar hidden" id="sidebar"><div class="person-detail"><div class="person-header"><button class="close-btn" id="close-sidebar">×</button><div class="avatar-placeholder">👤</div><h2 class="person-name" id="detail-name"></h2><div class="person-dates" id="detail-dates"></div></div><div class="info-section"><div class="info-row"><div class="info-label">👤 Пол</div><div class="info-value" id="detail-gender"></div></div><div class="info-row"><div class="info-label">📅 Рождение</div><div class="info-value" id="detail-birth"></div></div><div class="info-row"><div class="info-label">⚰️ Смерть</div><div class="info-value" id="detail-death"></div></div><div class="info-row"><div class="info-label">📍 Рождение</div><div class="info-value" id="detail-birth-place"></div></div><div class="info-row"><div class="info-label">📍 Смерть</div><div class="info-value" id="detail-death-place"></div></div><div class="info-row"><div class="info-label">💼 Деятельность</div><div class="info-value" id="detail-occupation"></div></div><div class="info-row"><div class="info-label">📖 Биография</div><div class="info-value bio" id="detail-bio"></div></div></div><div class="action-buttons"><button class="btn btn-secondary" id="edit-person-btn">✏️ Редактировать</button><button class="btn btn-danger" id="delete-person-btn">🗑️ Удалить</button></div></div></div>
</div>
<div class="modal" id="modal"><div class="modal-content"><h2 id="modal-title">Добавить персону</h2><form id="person-form"><div class="form-group"><label>ФИО *</label><input type="text" id="person-name" required></div><div class="form-group"><label>Пол</label><select id="person-gender"><option value="male">Мужской</option><option value="female">Женский</option></select></div><div class="form-group"><label>Дата рождения</label><input type="date" id="person-birth"></div><div class="form-group"><label>Дата смерти</label><input type="date" id="person-death"></div><div class="form-group"><label>Место рождения</label><input type="text" id="person-birth-place"></div><div class="form-group"><label>Место смерти</label><input type="text" id="person-death-place"></div><div class="form-group"><label>Деятельность</label><input type="text" id="person-occupation"></div><div class="form-group"><label>Биография</label><textarea id="person-bio" rows="3"></textarea></div><div class="form-group"><label>Родители</label><select id="person-father"></select><select id="person-mother" style="margin-top:8px"></select></div><div class="form-group"><label>Супруг(а)</label><select id="person-spouse"></select></div><div class="modal-buttons"><button type="submit" class="btn btn-primary">💾 Сохранить</button><button type="button" class="btn btn-outline" id="modal-close">Отмена</button></div></form></div></div>
<div id="notification-container"></div>
<script src="js/app.js"></script>
</body>
</html>
